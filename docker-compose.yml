version: "3.9"

services:
  auth_service:
    build: ./auth_service
    container_name: auth_service
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ./auth_service/.env
    volumes:
      - ./auth_service:/app

  bot_service:
    build: ./bot_service
    container_name: bot_service
    working_dir: /app
    command: uv run python run_bot.py
    env_file:
      - ./bot_service/.env
    volumes:
      - ./bot_service:/app
    depends_on:
      - redis
      - rabbitmq

  bot_api:
    build: ./bot_service
    container_name: bot_api
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - ./bot_service/.env
    volumes:
      - ./bot_service:/app
    depends_on:
      - redis
      - rabbitmq

  celery_worker:
    build: ./bot_service
    container_name: celery_worker
    working_dir: /app
    command: uv run celery -A app.infra.celery_app:celery_app worker --loglevel=info
    env_file:
      - ./bot_service/.env
    volumes:
      - ./bot_service:/app
    depends_on:
      - redis
      - rabbitmq

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"